name: Cloudflare Worker deploy

# Reusable workflow — wrangler deploy for CF Workers. On failure, calls
# notify-failure.yml so the alert flows through the same pipeline.

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: "Service label (parked, edge, etc.)"
      node_version:
        required: false
        type: string
        default: "22"
      typecheck_cmd:
        required: false
        type: string
        default: "npm run typecheck"

    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      ALERTMANAGER_URL:
        required: true
      ALERTMANAGER_USER:
        required: true
      ALERTMANAGER_PASSWORD:
        required: true

concurrency:
  group: ${{ inputs.service }}-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ${{ inputs.service }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - run: npm ci
      - run: ${{ inputs.typecheck_cmd }}
      - name: Wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

  notify:
    name: Notify on failure
    needs: deploy
    if: failure()
    uses: 021is/ci/.github/workflows/notify-failure.yml@main
    with:
      project: ${{ inputs.service }}
      alertname: ${{ inputs.service }}-deploy-failed
      severity: critical
    secrets: inherit
