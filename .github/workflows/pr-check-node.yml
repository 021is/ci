name: PR check (Node/TS)

# Reusable workflow — typecheck + lint + build dry-run for any Node/TS repo.
# Call from a PR-triggered workflow OR as a pre-deploy quality gate.

on:
  workflow_call:
    inputs:
      runtime:
        required: false
        type: string
        default: bun
        description: "bun | node — which runtime to install"
      node_version:
        required: false
        type: string
        default: "22"
      install_cmd:
        required: false
        type: string
        default: ""
        description: "Override install command. Default: bun install --frozen-lockfile (bun) or npm ci (node)."
      pre_build_cmd:
        required: false
        type: string
        default: ""
        description: "Run between install and typecheck (e.g. 'bunx prisma generate')."
      typecheck_cmd:
        required: false
        type: string
        default: ""
        description: "Override. Default: bun run typecheck (bun) or npm run typecheck (node)."
      lint_cmd:
        required: false
        type: string
        default: ""
        description: "Override. Default: bun run lint || true (bun) or npm run lint || true (node)."
      build_cmd:
        required: false
        type: string
        default: ""
        description: "Override. Default: bun run build (bun) or npm run build (node)."
      build_env:
        required: false
        type: string
        default: ""
        description: "Multi-line KEY=VAL placeholder env for the build step (each on its own line). Use for repos whose build references prod env vars that have no CI equivalent."
      skip_build:
        required: false
        type: boolean
        default: false
        description: "Skip the build step (when env requirements make a meaningful dry-run impossible)"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        if: inputs.runtime == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install
        run: ${{ inputs.install_cmd || (inputs.runtime == 'bun' && 'bun install --frozen-lockfile' || 'npm ci') }}

      - name: Pre-build
        if: inputs.pre_build_cmd != ''
        run: ${{ inputs.pre_build_cmd }}

      - name: Typecheck
        run: ${{ inputs.typecheck_cmd || (inputs.runtime == 'bun' && 'bun run typecheck' || 'npm run typecheck') }}

      - name: Lint
        run: ${{ inputs.lint_cmd || (inputs.runtime == 'bun' && 'bun run lint || true' || 'npm run lint || true') }}

      - name: Build
        if: inputs.skip_build == false
        env:
          BUILD_ENV_BLOCK: ${{ inputs.build_env }}
        run: |
          # Export each KEY=VAL line from build_env into the build's environment
          if [ -n "$BUILD_ENV_BLOCK" ]; then
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              # Strip leading/trailing whitespace; export only valid KEY=VAL
              line=$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
              case "$line" in
                *=*) export "$line" ;;
              esac
            done <<< "$BUILD_ENV_BLOCK"
          fi
          ${{ inputs.build_cmd || (inputs.runtime == 'bun' && 'bun run build' || 'npm run build') }}
